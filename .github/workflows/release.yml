name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}
      release_commit: ${{ steps.meta.outputs.release_commit }}
      owner_lower: ${{ steps.meta.outputs.owner_lower }}
      repo_name: ${{ steps.meta.outputs.repo_name }}
      build_date: ${{ steps.meta.outputs.build_date }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      release_notes: ${{ steps.meta.outputs.release_notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME=${{ github.event.inputs.tag }}
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi

          VERSION=${TAG_NAME#v}
          OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          RELEASE_COMMIT=$(git rev-list -n 1 "${TAG_NAME}^{commit}")
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          IS_PRERELEASE=false
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          fi

          git fetch --tags --force
          TAG_MESSAGE=$(git tag -l --format='%(contents:body)' "$TAG_NAME")

          {
            echo "tag_name=$TAG_NAME"
            echo "version=$VERSION"
            echo "release_commit=$RELEASE_COMMIT"
            echo "owner_lower=$OWNER_LOWER"
            echo "repo_name=${{ github.event.repository.name }}"
            echo "build_date=$BUILD_DATE"
            echo "is_prerelease=$IS_PRERELEASE"
            echo "release_notes<<EOF"
            echo "$TAG_MESSAGE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-frontend-dist:
    needs: metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-backend-images:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: gateway
            dockerfile: Dockerfile.gateway
          - name: control
            dockerfile: Dockerfile.control
          - name: worker
            dockerfile: Dockerfile.worker
          - name: billing
            dockerfile: Dockerfile.billing
          - name: bootstrap
            dockerfile: Dockerfile.bootstrap
    runs-on: ubuntu-24.04
    env:
      IMAGE_NAME: ghcr.io/${{ needs.metadata.outputs.owner_lower }}/${{ needs.metadata.outputs.repo_name }}/${{ matrix.service.name }}
      PLATFORM: linux/amd64
      ARCH: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.metadata.outputs.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: ${{ env.PLATFORM }}
          build-args: |
            VERSION=${{ needs.metadata.outputs.version }}
            COMMIT=${{ needs.metadata.outputs.release_commit }}
            DATE=${{ needs.metadata.outputs.build_date }}
          labels: |
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.revision=${{ needs.metadata.outputs.release_commit }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.created=${{ needs.metadata.outputs.build_date }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.service.name }}-${{ env.ARCH }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  build-frontend-images:
    needs: [metadata, build-frontend-dist]
    runs-on: ubuntu-24.04
    env:
      IMAGE_NAME: ghcr.io/${{ needs.metadata.outputs.owner_lower }}/${{ needs.metadata.outputs.repo_name }}/frontend
      PLATFORM: linux/amd64
      ARCH: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.metadata.outputs.tag_name }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend.release
          platforms: ${{ env.PLATFORM }}
          labels: |
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.revision=${{ needs.metadata.outputs.release_commit }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.created=${{ needs.metadata.outputs.build_date }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-frontend-${{ env.ARCH }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    needs: [metadata, build-backend-images, build-frontend-images]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - control
          - worker
          - billing
          - bootstrap
          - frontend
    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: digests-${{ matrix.service }}-*
          path: ${{ runner.temp }}/digests/${{ matrix.service }}
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          IMAGE_NAME: ghcr.io/${{ needs.metadata.outputs.owner_lower }}/${{ needs.metadata.outputs.repo_name }}/${{ matrix.service }}
          VERSION: ${{ needs.metadata.outputs.version }}
          IS_PRERELEASE: ${{ needs.metadata.outputs.is_prerelease }}
        run: |
          TAG_ARGS=(-t "${IMAGE_NAME}:${VERSION}")
          if [ "${IS_PRERELEASE}" != "true" ]; then
            major=${VERSION%%.*}
            rest=${VERSION#*.}
            minor=${rest%%.*}
            TAG_ARGS+=(-t "${IMAGE_NAME}:latest" -t "${IMAGE_NAME}:${major}.${minor}" -t "${IMAGE_NAME}:${major}")
          fi

          DIGEST_REFS=()
          while IFS= read -r file; do
            DIGEST_REFS+=("${IMAGE_NAME}@sha256:$(basename "$file")")
          done < <(find "${RUNNER_TEMP}/digests/${{ matrix.service }}" -type f | sort)

          if [ "${#DIGEST_REFS[@]}" -eq 0 ]; then
            echo "No digests found for $IMAGE_NAME" >&2
            exit 1
          fi

          docker buildx imagetools create "${TAG_ARGS[@]}" "${DIGEST_REFS[@]}"
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}"

  publish-release:
    needs: [metadata, merge-manifests]
    runs-on: ubuntu-24.04
    steps:
      - name: Create or update GitHub Release
        uses: actions/github-script@v8
        env:
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
          VERSION: ${{ needs.metadata.outputs.version }}
          OWNER_LOWER: ${{ needs.metadata.outputs.owner_lower }}
          REPO_NAME: ${{ needs.metadata.outputs.repo_name }}
          RELEASE_NOTES: ${{ needs.metadata.outputs.release_notes }}
          IS_PRERELEASE: ${{ needs.metadata.outputs.is_prerelease }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = process.env.TAG_NAME;
            const version = process.env.VERSION;
            const ownerLower = process.env.OWNER_LOWER;
            const repoName = process.env.REPO_NAME;
            const releaseNotes = process.env.RELEASE_NOTES || "";
            const prerelease = process.env.IS_PRERELEASE === "true";
            const body = [
              "> AI API Gateway Platform - 将 AI 订阅配额分发和管理",
              "",
              releaseNotes,
              "",
              "---",
              "",
              "## 📥 Installation",
              "",
              "**Docker:**",
              "```bash",
              `docker pull ghcr.io/${ownerLower}/${repoName}/gateway:${version}`,
              `docker pull ghcr.io/${ownerLower}/${repoName}/control:${version}`,
              `docker pull ghcr.io/${ownerLower}/${repoName}/frontend:${version}`,
              `docker pull ghcr.io/${ownerLower}/${repoName}/worker:${version}`,
              `docker pull ghcr.io/${ownerLower}/${repoName}/billing:${version}`,
              `docker pull ghcr.io/${ownerLower}/${repoName}/bootstrap:${version}`,
              "```",
              "",
              "## 📚 Documentation",
              "",
              `- [GitHub Repository](https://github.com/${context.repo.owner}/${context.repo.repo})`,
              `- [Deployment Guide](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/DEPLOY.md)`,
            ].join("\n");

            let releaseId;
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              });
              releaseId = existing.data.id;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (releaseId) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                tag_name: tagName,
                name: `Robust2API ${version}`,
                body,
                draft: false,
                prerelease,
              });
              core.info(`Updated release for ${tagName}`);
            } else {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                name: `Robust2API ${version}`,
                body,
                draft: false,
                prerelease,
              });
              core.info(`Created release for ${tagName}`);
            }

  sync-version-file:
    needs: [metadata, publish-release]
    if: ${{ needs.publish-release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Sync VERSION files to released tag
        run: |
          VERSION=${{ needs.metadata.outputs.version }}

          CURRENT_VERSION=$(tr -d '\r\n' < backend/cmd/gateway/VERSION || true)
          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "VERSION files already match $VERSION"
            exit 0
          fi

          echo "$VERSION" > backend/cmd/gateway/VERSION
          echo "$VERSION" > backend/cmd/control/VERSION
          echo "$VERSION" > backend/cmd/worker/VERSION
          echo "$VERSION" > backend/cmd/billing/VERSION
          echo "$VERSION" > backend/cmd/bootstrap/VERSION

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/cmd/gateway/VERSION backend/cmd/control/VERSION backend/cmd/worker/VERSION backend/cmd/billing/VERSION backend/cmd/bootstrap/VERSION
          git commit -m "chore: sync VERSION to ${VERSION} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}

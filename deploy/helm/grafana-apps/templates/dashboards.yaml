{{- $root := . -}}
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana-apps.dashboardConfigMapName" (dict "root" $root "path" $path) }}
  namespace: {{ $root.Values.namespace }}
  labels:
    {{- include "grafana-apps.labels" $root | nindent 4 }}
    grafana_dashboard: "1"
data:
  {{ base $path }}: |
{{ $root.Files.Get $path | indent 4 }}
{{- end }}

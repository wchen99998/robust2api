{{- if (index .Values "kube-prometheus-stack").enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: sub2api-grafana-dashboards
  namespace: {{ .Values.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  sub2api-admin-overview.json: |
    {
      "title": "Sub2API Admin Overview",
      "uid": "sub2api-admin-overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "timezone": "browser",
      "time": { "from": "now-24h", "to": "now" },
      "annotations": { "list": [] },
      "panels": [
        {
          "id": 1,
          "title": "Total Users",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COUNT(*)::double precision AS value FROM users WHERE deleted_at IS NULL"
            }
          ]
        },
        {
          "id": 2,
          "title": "Active API Keys",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COUNT(*)::double precision AS value FROM api_keys WHERE deleted_at IS NULL AND status = 'active'"
            }
          ]
        },
        {
          "id": 3,
          "title": "Total Accounts",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COUNT(*)::double precision AS value FROM accounts WHERE deleted_at IS NULL"
            }
          ]
        },
        {
          "id": 4,
          "title": "Today Requests",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COALESCE(total_requests, 0)::double precision AS value FROM usage_dashboard_daily WHERE bucket_date = CURRENT_DATE"
            }
          ]
        },
        {
          "id": 5,
          "title": "Total Requests",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COALESCE(SUM(total_requests), 0)::double precision AS value FROM usage_dashboard_daily"
            }
          ]
        },
        {
          "id": 6,
          "title": "Today Actual Cost",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COALESCE(actual_cost, 0)::double precision AS value FROM usage_dashboard_daily WHERE bucket_date = CURRENT_DATE"
            }
          ]
        },
        {
          "id": 7,
          "title": "Today Tokens",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 4 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COALESCE(input_tokens + output_tokens + cache_creation_tokens + cache_read_tokens, 0)::double precision AS value FROM usage_dashboard_daily WHERE bucket_date = CURRENT_DATE"
            }
          ]
        },
        {
          "id": 8,
          "title": "Total Tokens",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 4 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COALESCE(SUM(input_tokens + output_tokens + cache_creation_tokens + cache_read_tokens), 0)::double precision AS value FROM usage_dashboard_daily"
            }
          ]
        },
        {
          "id": 9,
          "title": "Total Actual Cost",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 4 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COALESCE(SUM(actual_cost), 0)::double precision AS value FROM usage_dashboard_daily"
            }
          ]
        },
        {
          "id": 10,
          "title": "Active Users (Today)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 4 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COALESCE(active_users, 0)::double precision AS value FROM usage_dashboard_daily WHERE bucket_date = CURRENT_DATE"
            }
          ]
        },
        {
          "id": 11,
          "title": "RPM (Last Hour)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 4 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COALESCE(total_requests / 60.0, 0)::double precision AS value FROM usage_dashboard_hourly ORDER BY bucket_start DESC LIMIT 1"
            }
          ]
        },
        {
          "id": 12,
          "title": "Average Duration (ms)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 4 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT CASE WHEN COALESCE(SUM(total_requests), 0) = 0 THEN 0 ELSE (SUM(total_duration_ms)::double precision / SUM(total_requests)::double precision) END AS value FROM usage_dashboard_daily"
            }
          ]
        },
        {
          "id": 13,
          "title": "Requests Trend (Hourly)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "rawSql": "SELECT $__timeGroupAlias(bucket_start, '1h'), SUM(total_requests)::double precision AS requests FROM usage_dashboard_hourly WHERE $__timeFilter(bucket_start) GROUP BY 1 ORDER BY 1"
            }
          ]
        },
        {
          "id": 14,
          "title": "Actual Cost Trend (Daily)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "rawSql": "SELECT $__timeGroupAlias(bucket_date::timestamp, '1d'), SUM(actual_cost)::double precision AS actual_cost FROM usage_dashboard_daily WHERE $__timeFilter(bucket_date::timestamp) GROUP BY 1 ORDER BY 1"
            }
          ]
        }
      ]
    }
  sub2api-admin-usage.json: |
    {
      "title": "Sub2API Admin Usage",
      "uid": "sub2api-admin-usage",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "timezone": "browser",
      "time": { "from": "now-7d", "to": "now" },
      "annotations": { "list": [] },
      "panels": [
        {
          "id": 1,
          "title": "Hourly Requests",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "rawSql": "SELECT $__timeGroupAlias(bucket_start, '1h'), SUM(total_requests)::double precision AS requests FROM usage_dashboard_hourly WHERE $__timeFilter(bucket_start) GROUP BY 1 ORDER BY 1"
            }
          ]
        },
        {
          "id": 2,
          "title": "Hourly Tokens",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "rawSql": "SELECT $__timeGroupAlias(bucket_start, '1h'), SUM(input_tokens + output_tokens + cache_creation_tokens + cache_read_tokens)::double precision AS total_tokens FROM usage_dashboard_hourly WHERE $__timeFilter(bucket_start) GROUP BY 1 ORDER BY 1"
            }
          ]
        },
        {
          "id": 3,
          "title": "Actual Cost (Daily)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "rawSql": "SELECT $__timeGroupAlias(bucket_date::timestamp, '1d'), SUM(actual_cost)::double precision AS actual_cost FROM usage_dashboard_daily WHERE $__timeFilter(bucket_date::timestamp) GROUP BY 1 ORDER BY 1"
            }
          ]
        },
        {
          "id": 4,
          "title": "Model Spend Top 12",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COALESCE(NULLIF(requested_model, ''), NULLIF(model, ''), 'unknown') AS model, COUNT(*)::bigint AS requests, SUM(input_tokens + output_tokens + cache_creation_tokens + cache_read_tokens)::bigint AS tokens, SUM(actual_cost)::double precision AS actual_cost FROM usage_logs WHERE $__timeFilter(created_at) GROUP BY 1 ORDER BY actual_cost DESC LIMIT 12"
            }
          ]
        },
        {
          "id": 5,
          "title": "Group Spend",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT COALESCE(g.name, CONCAT('group-', u.group_id::text)) AS group_name, COUNT(*)::bigint AS requests, SUM(actual_cost)::double precision AS actual_cost, SUM(input_tokens + output_tokens + cache_creation_tokens + cache_read_tokens)::bigint AS tokens FROM usage_logs u LEFT JOIN groups g ON g.id = u.group_id WHERE $__timeFilter(u.created_at) GROUP BY 1 ORDER BY actual_cost DESC LIMIT 20"
            }
          ]
        },
        {
          "id": 6,
          "title": "Top Users by Actual Cost",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "table",
              "rawSql": "SELECT u.user_id, COALESCE(NULLIF(us.username, ''), us.email, u.user_id::text) AS user_name, COUNT(*)::bigint AS requests, SUM(actual_cost)::double precision AS actual_cost, SUM(input_tokens + output_tokens + cache_creation_tokens + cache_read_tokens)::bigint AS tokens FROM usage_logs u LEFT JOIN users us ON us.id = u.user_id WHERE $__timeFilter(u.created_at) GROUP BY 1,2 ORDER BY actual_cost DESC LIMIT 12"
            }
          ]
        },
        {
          "id": 7,
          "title": "Top Users Token Trend",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 24 },
          "datasource": { "type": "postgres", "uid": "sub2api-pg" },
          "targets": [
            {
              "refId": "A",
              "format": "time_series",
              "rawSql": "WITH top_users AS (SELECT user_id FROM usage_logs WHERE $__timeFilter(created_at) GROUP BY user_id ORDER BY SUM(input_tokens + output_tokens + cache_creation_tokens + cache_read_tokens) DESC LIMIT 8) SELECT $__timeGroupAlias(u.created_at, '1h'), COALESCE(NULLIF(us.username, ''), us.email, u.user_id::text) AS metric, SUM(u.input_tokens + u.output_tokens + u.cache_creation_tokens + u.cache_read_tokens)::double precision AS value FROM usage_logs u LEFT JOIN users us ON us.id = u.user_id WHERE $__timeFilter(u.created_at) AND u.user_id IN (SELECT user_id FROM top_users) GROUP BY 1,2 ORDER BY 1"
            }
          ]
        }
      ]
    }
  sub2api-runtime.json: |
    {
      "annotations": { "list": [] },
      "title": "Sub2API Runtime",
      "uid": "sub2api-runtime",
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "platform",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(sub2api_http_requests_total, platform)",
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(sub2api_http_requests_total{platform=~\"$platform\"}[5m]))",
              "legendFormat": "RPS"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(sub2api_http_requests_total{http_status_code=~\"5..\",platform=~\"$platform\"}[5m])) / clamp_min(sum(rate(sub2api_http_requests_total{platform=~\"$platform\"}[5m])), 1)",
              "legendFormat": "5xx"
            }
          ]
        },
        {
          "id": 3,
          "title": "Latency p95 (s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(sub2api_http_request_duration_seconds_bucket{platform=~\"$platform\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "id": 4,
          "title": "TTFT p95 (s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(sub2api_http_request_ttft_seconds_bucket{platform=~\"$platform\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        },
        {
          "id": 5,
          "title": "Token Throughput",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(sub2api_tokens_total{direction=\"input\",platform=~\"$platform\"}[5m]))",
              "legendFormat": "Input TPS"
            },
            {
              "expr": "sum(rate(sub2api_tokens_total{direction=\"output\",platform=~\"$platform\"}[5m]))",
              "legendFormat": "Output TPS"
            }
          ]
        },
        {
          "id": 6,
          "title": "Upstream Errors",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(sub2api_upstream_errors_total{platform=~\"$platform\"}[5m]))",
              "legendFormat": "Errors/s"
            }
          ]
        },
        {
          "id": 7,
          "title": "Account Failovers (Last Hour)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(increase(sub2api_account_failovers_total{platform=~\"$platform\"}[1h]))",
              "legendFormat": "failovers"
            }
          ]
        },
        {
          "id": 8,
          "title": "Rate Limit Rejections (Last Hour)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(increase(sub2api_ratelimit_rejections_total[1h]))",
              "legendFormat": "rejections"
            }
          ]
        },
        {
          "id": 9,
          "title": "Concurrency Queue Depth",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "max(sub2api_concurrency_queue_depth)",
              "legendFormat": "queue"
            }
          ]
        },
        {
          "id": 10,
          "title": "Active Upstream Accounts",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(sub2api_upstream_accounts_active{platform=~\"$platform\"})",
              "legendFormat": "accounts"
            }
          ]
        }
      ]
    }
  sub2api-resources.json: |
    {
      "title": "Sub2API Resources",
      "uid": "sub2api-resources",
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "title": "Goroutines",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "go_goroutine_count{job=~\".*sub2api.*\"}",
              "legendFormat": "Goroutines"
            }
          ]
        },
        {
          "title": "Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum(go_memory_used_bytes{job=~\".*sub2api.*\"}) by (go_memory_type) / 1024 / 1024",
              "legendFormat": "{{ "{{" }}go_memory_type{{ "}}" }} Used (MB)"
            },
            {
              "expr": "sum(go_memory_gc_goal_bytes{job=~\".*sub2api.*\"}) / 1024 / 1024",
              "legendFormat": "GC Goal (MB)"
            }
          ]
        },
        {
          "title": "GC Pause Duration",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "rate(go_gc_duration_seconds_sum{job=~\".*sub2api.*\"}[5m]) * 1000",
              "legendFormat": "GC Pause (ms/s)"
            }
          ]
        }
      ]
    }
{{- end }}

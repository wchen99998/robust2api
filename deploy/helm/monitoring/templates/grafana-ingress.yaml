{{- $hostOverride := trim (default "" .Values.grafanaIngress.host) -}}
{{- if or .Values.grafanaIngress.enabled $hostOverride }}
{{- $grafanaHost := required "grafanaIngress.host or public.baseDomain must be set when Grafana ingress is requested" (include "sub2api-monitoring.grafanaHost" . | trim) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.grafanaIngress.clusterIssuer }}
    external-dns.alpha.kubernetes.io/hostname: {{ $grafanaHost }}
    external-dns.alpha.kubernetes.io/cloudflare-proxied: {{ .Values.grafanaIngress.cloudflareProxied | quote }}
spec:
  ingressClassName: {{ .Values.grafanaIngress.className }}
  {{- if .Values.grafanaIngress.tls.enabled }}
  tls:
    - hosts:
        - {{ $grafanaHost | quote }}
      secretName: {{ default "grafana-tls" .Values.grafanaIngress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ $grafanaHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-grafana
                port:
                  number: 80
{{- end }}

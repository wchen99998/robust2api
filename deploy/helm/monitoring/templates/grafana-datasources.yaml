{{- if (index .Values "kube-prometheus-stack").enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-extra
  namespace: {{ .Values.namespace }}
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://{{ .Release.Name }}-tempo.{{ .Values.namespace }}.svc:3200
        access: proxy
        isDefault: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false
          nodeGraph:
            enabled: true
      - name: Loki
        type: loki
        uid: loki
        url: http://{{ .Release.Name }}-loki-gateway.{{ .Values.namespace }}.svc:80
        access: proxy
        isDefault: false
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: '"trace_id":"(\w+)"'
              name: TraceID
              url: '$${__value.raw}'
              urlDisplayLabel: View Trace
---
{{- $pg := .Values.grafanaPostgresDatasource }}
{{- if and $pg.enabled $pg.host $pg.database $pg.user $pg.password }}
apiVersion: v1
kind: Secret
metadata:
  name: grafana-datasource-postgres
  namespace: {{ .Values.namespace }}
  labels:
    grafana_datasource: "1"
type: Opaque
stringData:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: {{ $pg.name | quote }}
        type: postgres
        uid: {{ $pg.uid | quote }}
        access: proxy
        url: {{ printf "%s:%v" $pg.host $pg.port | quote }}
        user: {{ $pg.user | quote }}
        database: {{ $pg.database | quote }}
        isDefault: false
        editable: false
        jsonData:
          sslmode: {{ default "require" $pg.sslmode | quote }}
          postgresVersion: 1600
          timescaledb: false
        secureJsonData:
          password: {{ $pg.password | quote }}
{{- end }}
{{- end }}

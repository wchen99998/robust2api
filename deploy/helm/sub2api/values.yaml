# -- Gateway Configuration
gateway:
  replicaCount: 1
  terminationGracePeriodSeconds: 20
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilization: 70
  pdb:
    enabled: false
    minAvailable: 1
  topologySpreadConstraints: []
  probes:
    startup:
      path: /startupz
      failureThreshold: 30
      periodSeconds: 2
    liveness:
      path: /livez
      periodSeconds: 30
    readiness:
      path: /readyz
      periodSeconds: 10

# -- Control Configuration
control:
  replicaCount: 1
  terminationGracePeriodSeconds: 20
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilization: 50
  pdb:
    enabled: false
    minAvailable: 1
  topologySpreadConstraints: []
  probes:
    startup:
      path: /startupz
      failureThreshold: 30
      periodSeconds: 2
    liveness:
      path: /livez
      periodSeconds: 30
    readiness:
      path: /readyz
      periodSeconds: 10
  frontend:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi
    port: 8081
    # Additional origins allowed in iframe embeds rendered by the control frontend.
    # Add any origins used by Grafana, purchase/subscription pages, custom menu items,
    # or URL-based home content. Cloudflare Turnstile is always allowed automatically.
    extraFrameSrcOrigins: []

# -- Worker Configuration
worker:
  replicaCount: 1
  healthPort: 8081
  terminationGracePeriodSeconds: 30
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  probes:
    startup:
      path: /startupz
      failureThreshold: 30
      periodSeconds: 2
    liveness:
      path: /livez
      periodSeconds: 30
    readiness:
      path: /readyz
      periodSeconds: 10

image:
  gateway:
    repository: ghcr.io/wchen99998/robust2api/gateway
    tag: ""
    pullPolicy: IfNotPresent
  control:
    repository: ghcr.io/wchen99998/robust2api/control
    tag: ""
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/wchen99998/robust2api/frontend
    tag: ""
    pullPolicy: IfNotPresent
  worker:
    repository: ghcr.io/wchen99998/robust2api/worker
    tag: ""
    pullPolicy: IfNotPresent
  bootstrap:
    repository: ghcr.io/wchen99998/robust2api/bootstrap
    tag: ""
    pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override chart name
nameOverride: ""
# -- Override full release name
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- ServiceAccount annotations
  annotations: {}
  # -- ServiceAccount name (auto-generated if empty)
  name: ""

# -- Use an existing shared Secret instead of creating one.
# The shared secret should contain runtime/shared keys only, such as
# DATABASE_PASSWORD and REDIS_PASSWORD.
existingSecret: ""

# -- Optional existing control-plane Secret.
# When set, control/bootstrap load JWT/TOTP/admin secrets from this secret instead of
# the chart-managed control secret.
existingControlSecret: ""

# =============================================================================
# Application Configuration (non-sensitive, stored in ConfigMap)
# =============================================================================
config:
  serverPort: "8080"
  serverMode: "release"
  runMode: "standard"
  timezone: "Asia/Shanghai"
  # Public Grafana base URL exposed to the app for the admin dashboard iframe.
  # Example: https://grafana-monitoring.example.com
  grafanaUrl: ""

  database:
    maxOpenConns: 50
    maxIdleConns: 10
    connMaxLifetimeMinutes: 30
    connMaxIdleTimeMinutes: 5

  redis:
    db: 0
    poolSize: 1024
    minIdleConns: 10
    enableTLS: false

  security:
    urlAllowlistEnabled: false
    urlAllowlistAllowInsecureHTTP: false
    urlAllowlistAllowPrivateHosts: false
    urlAllowlistUpstreamHosts: ""

# -- Extra environment variables added to ConfigMap (key-value pairs)
extraEnv: {}

# =============================================================================
# Secrets (sensitive, stored in Secret)
# =============================================================================
secrets:
  jwtSecret: ""
  jwtExpireHour: "24"
  totpEncryptionKey: ""
  adminEmail: "admin@sub2api.local"
  adminPassword: ""
  geminiOAuthClientID: ""
  geminiOAuthClientSecret: ""
  geminiCliOAuthClientSecret: ""
  antigravityOAuthClientSecret: ""

# -- Extra secret environment variables (key-value pairs)
extraSecretEnv: {}

# =============================================================================
# Bootstrap Job
# =============================================================================
bootstrap:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300

# =============================================================================
# Service
# =============================================================================
service:
  type: ClusterIP
  port: 80

controlService:
  type: ClusterIP
  port: 80

# =============================================================================
# Ingress
# =============================================================================
ingress:
  enabled: true
  className: "nginx"
  cloudflareProxied: "true"
  maxBodySize: "50m"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: false
    secretName: ""
  gateway:
    enabled: true
    host: gateway.sub2api.local
    extraHosts: []
    tls:
      enabled: false
      secretName: ""
  control:
    enabled: true
    host: app.sub2api.local
    extraHosts: []
    tls:
      enabled: false
      secretName: ""

# =============================================================================
# Scheduling
# =============================================================================
nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# PostgreSQL Subchart (Bitnami)
# =============================================================================
postgresql:
  enabled: true
  auth:
    username: sub2api
    password: ""
    database: sub2api
  primary:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    persistence:
      size: 5Gi

# -- External database (used when postgresql.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  user: sub2api
  password: ""
  database: sub2api
  sslmode: require

# =============================================================================
# Redis Subchart (Bitnami)
# =============================================================================
redis:
  enabled: true
  auth:
    enabled: true
    password: ""
  architecture: standalone
  master:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    persistence:
      size: 1Gi

# -- External Redis (used when redis.enabled=false)
externalRedis:
  host: ""
  port: 6379
  password: ""
  enableTLS: false

## Observability (OpenTelemetry + Prometheus metrics)
observability:
  enabled: false
  otel:
    serviceName: "sub2api"
    endpoint: "monitoring-alloy.monitoring.svc:4317"
    traceSampleRate: "0.1"
    metricsPort: 9090
  serviceMonitor:
    enabled: false
    interval: 15s
    labels: {}

# -- Gateway Configuration
gateway:
  enabled: true
  replicaCount: 1
  terminationGracePeriodSeconds: 20
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilization: 70
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "0"
      maxSurge: "1"
  pdb:
    enabled: false
    minAvailable: 1
  topologySpreadConstraints: []
  probes:
    startup:
      path: /startupz
      failureThreshold: 30
      periodSeconds: 2
    liveness:
      path: /livez
      periodSeconds: 30
    readiness:
      path: /readyz
      periodSeconds: 10

# -- Control Configuration
control:
  enabled: true
  replicaCount: 1
  terminationGracePeriodSeconds: 20
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilization: 50
  pdb:
    enabled: false
    minAvailable: 1
  topologySpreadConstraints: []
  probes:
    startup:
      path: /startupz
      failureThreshold: 30
      periodSeconds: 2
    liveness:
      path: /livez
      periodSeconds: 30
    readiness:
      path: /readyz
      periodSeconds: 10
  frontend:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi
    port: 8081
    # Additional origins allowed in iframe embeds rendered by the control frontend.
    # The resolved Grafana public URL origin is added automatically.
    # Add any additional origins used by purchase/subscription pages, custom menu items,
    # or URL-based home content. Cloudflare Turnstile is always allowed automatically.
    extraFrameSrcOrigins: []

# -- Frontend edge proxy configuration
frontend:
  enabled: true
  replicaCount: 1
  terminationGracePeriodSeconds: 20
  topologySpreadConstraints: []
  # Optional explicit in-cluster control service name for Nginx proxying.
  # Empty preserves single-release behavior by targeting <release>-control-api.
  controlServiceName: ""
  # Optional explicit in-cluster gateway service name for Nginx proxying.
  # Empty preserves single-release behavior by targeting <release>-gateway.
  gatewayServiceName: ""

# -- Worker Configuration
worker:
  enabled: true
  replicaCount: 1
  healthPort: 8081
  terminationGracePeriodSeconds: 30
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  probes:
    startup:
      path: /startupz
      failureThreshold: 30
      periodSeconds: 2
    liveness:
      path: /livez
      periodSeconds: 30
    readiness:
      path: /readyz
      periodSeconds: 10

# -- Billing Configuration
billing:
  enabled: false
  replicaCount: 2
  healthPort: 8082
  terminationGracePeriodSeconds: 30
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  probes:
    startup:
      path: /startupz
      failureThreshold: 30
      periodSeconds: 2
    liveness:
      path: /livez
      periodSeconds: 30
    readiness:
      path: /readyz
      periodSeconds: 10

image:
  gateway:
    repository: ghcr.io/wchen99998/robust2api/gateway
    tag: ""
    pullPolicy: IfNotPresent
  control:
    repository: ghcr.io/wchen99998/robust2api/control
    tag: ""
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/wchen99998/robust2api/frontend
    tag: ""
    pullPolicy: IfNotPresent
  worker:
    repository: ghcr.io/wchen99998/robust2api/worker
    tag: ""
    pullPolicy: IfNotPresent
  billing:
    repository: ghcr.io/wchen99998/robust2api/billing
    tag: ""
    pullPolicy: IfNotPresent
  bootstrap:
    repository: ghcr.io/wchen99998/robust2api/bootstrap
    tag: ""
    pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override chart name
nameOverride: ""
# -- Override full release name
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- ServiceAccount annotations
  annotations: {}
  # -- ServiceAccount name (auto-generated if empty)
  name: ""

# =============================================================================
# Public Endpoint Convention
# =============================================================================
public:
  # -- Base domain used to derive public service hosts as <service>-<namespace>.<baseDomain>
  baseDomain: "sub2api.local"
  gateway:
    # -- Optional explicit scheme for the public gateway URL (for example, https when TLS terminates before ingress).
    # When empty, fall back to the gateway ingress TLS setting for backward compatibility.
    scheme: ""
  control:
    # -- Optional explicit scheme for the public control/frontend URL.
    # When empty, fall back to the control ingress TLS setting for backward compatibility.
    scheme: ""
  grafana:
    # -- Enable convention-based Grafana URL derivation for the admin dashboard.
    # When false, config.grafanaUrl must be set explicitly to enable embedding.
    enabled: false
    # -- Namespace where the monitoring stack is deployed.
    namespace: "monitoring"
    # -- Optional explicit Grafana host override. Set this to mirror monitoring.grafanaIngress.host when using a vanity/shared host.
    host: ""
    # -- Optional explicit scheme for the public Grafana URL.
    # When empty, fall back to public.grafana.tls.enabled for backward compatibility.
    scheme: ""
    tls:
      # -- Deprecated fallback used only when public.grafana.scheme is empty.
      enabled: true

# -- Use an existing shared Secret instead of creating one.
# The shared secret should contain runtime/shared keys only, such as
# DATABASE_PASSWORD and REDIS_PASSWORD.
existingSecret: ""

# -- Optional existing control-plane Secret.
# When set, control/bootstrap load JWT/TOTP/admin secrets from this secret instead of
# the chart-managed control secret.
existingControlSecret: ""

# =============================================================================
# Application Configuration (non-sensitive, stored in ConfigMap)
# =============================================================================
config:
  serverPort: "8080"
  serverMode: "release"
  runMode: "standard"
  timezone: "Asia/Shanghai"
  # Optional override for the public gateway base URL shown to API clients.
  # When empty and gateway ingress is enabled, derive from ingress using
  # <public.gateway.scheme>://gateway-<namespace>.<public.baseDomain>.
  gatewayUrl: ""
  # Optional override for the public Grafana base URL exposed to the app for
  # the admin dashboard iframe. When empty and public.grafana.enabled=true,
  # derive from public.grafana.{host,scheme} or the shared convention.
  grafanaUrl: ""
  # Optional override for the control/frontend public base URL used to generate
  # password reset and similar external links. When empty and control ingress is
  # enabled, derive from ingress using <public.control.scheme>://app-<namespace>.<public.baseDomain>.
  frontendUrl: ""

  database:
    maxOpenConns: 50
    maxIdleConns: 10
    connMaxLifetimeMinutes: 30
    connMaxIdleTimeMinutes: 5

  redis:
    db: 0
    poolSize: 1024
    minIdleConns: 10
    enableTLS: false

  security:
    urlAllowlistEnabled: false
    urlAllowlistAllowInsecureHTTP: false
    urlAllowlistAllowPrivateHosts: false
    urlAllowlistUpstreamHosts: ""

# -- Extra environment variables added to ConfigMap (key-value pairs)
extraEnv: {}

# =============================================================================
# Secrets (sensitive, stored in Secret)
# =============================================================================
secrets:
  jwtSecret: ""
  jwtExpireHour: "24"
  totpEncryptionKey: ""
  adminEmail: "admin@sub2api.local"
  adminPassword: ""
  geminiOAuthClientID: ""
  geminiOAuthClientSecret: ""
  geminiCliOAuthClientSecret: ""
  antigravityOAuthClientSecret: ""

# -- Extra secret environment variables (key-value pairs)
extraSecretEnv: {}

# =============================================================================
# Bootstrap Job
# =============================================================================
bootstrap:
  enabled: true
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  # Increment to force a new bootstrap run without changing other values.
  manualRerunToken: ""

# =============================================================================
# Service
# =============================================================================
service:
  type: ClusterIP
  port: 80

controlService:
  type: ClusterIP
  port: 80

controlAPIService:
  type: ClusterIP
  port: 8080

# =============================================================================
# Ingress
# =============================================================================
ingress:
  enabled: true
  className: "nginx"
  cloudflareProxied: "true"
  # Default body-size limit applied to ingresses that do not specify a
  # per-service override below.
  maxBodySize: "50m"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  # Deprecated: use the per-service TLS settings below. This top-level key is
  # kept only for backward-compatible values files and is not used by templates.
  tls:
    enabled: false
    secretName: ""
  gateway:
    enabled: true
    # Optional override. When empty, derive as gateway-<namespace>.<public.baseDomain>.
    host: ""
    extraHosts: []
    # Optional per-ingress override for nginx.ingress.kubernetes.io/proxy-body-size.
    maxBodySize: ""
    annotations: {}
    tls:
      enabled: false
      secretName: ""
  control:
    enabled: true
    # Optional override. When empty, derive as app-<namespace>.<public.baseDomain>.
    host: ""
    extraHosts: []
    # Optional per-ingress override for nginx.ingress.kubernetes.io/proxy-body-size.
    maxBodySize: ""
    annotations: {}
    tls:
      enabled: false
      secretName: ""

# =============================================================================
# Scheduling
# =============================================================================
nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# PostgreSQL Subchart (Bitnami)
# =============================================================================
postgresql:
  enabled: true
  auth:
    postgresPassword: ""
    username: sub2api
    password: ""
    database: sub2api
  primary:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    persistence:
      size: 5Gi

# -- External database (used when postgresql.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  user: sub2api
  password: ""
  database: sub2api
  sslmode: require

# =============================================================================
# Grafana provisioning
# =============================================================================
grafanaProvisioning:
  enabled: false
  monitoringNamespace: monitoring
  datasource:
    name: Sub2API PostgreSQL
    uid: sub2api-pg
    postgresVersion: 1700
  reader:
    username: grafana_reader
    password: ""

# =============================================================================
# Redis Subchart (Bitnami)
# =============================================================================
redis:
  enabled: true
  auth:
    enabled: true
    password: ""
  architecture: standalone
  master:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    persistence:
      size: 1Gi

# -- External Redis (used when redis.enabled=false)
externalRedis:
  host: ""
  port: 6379
  password: ""
  enableTLS: false

## Observability (OpenTelemetry + Prometheus metrics)
observability:
  enabled: false
  otel:
    serviceName: "sub2api"
    environment: ""
    endpoint: "monitoring-alloy.monitoring.svc:4317"
    traceSampleRate: "0.1"
    metricsPort: 9090
  serviceMonitor:
    enabled: false
    interval: 15s
    labels: {}

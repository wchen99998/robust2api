{{- if and .Values.gateway.enabled .Values.gateway.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "sub2api.fullname" . }}-gateway
  labels:
    {{- include "sub2api.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  minAvailable: {{ .Values.gateway.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "sub2api.gateway.selectorLabels" . | nindent 6 }}
{{- end }}

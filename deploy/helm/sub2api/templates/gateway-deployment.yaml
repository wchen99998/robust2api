apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sub2api.fullname" . }}-gateway
  labels:
    {{- include "sub2api.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  {{- if not .Values.gateway.autoscaling.enabled }}
  replicas: {{ .Values.gateway.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sub2api.gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/runtime-secret.yaml") . | sha256sum }}
      labels:
        {{- include "sub2api.labels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sub2api.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: {{ default 20 .Values.gateway.terminationGracePeriodSeconds }}
      containers:
        - name: gateway
          image: "{{ .Values.image.gateway.repository }}:{{ .Values.image.gateway.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.gateway.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if ((.Values.observability).enabled) }}
            - name: metrics
              containerPort: {{ .Values.observability.otel.metricsPort }}
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "sub2api.fullname" . }}
            - secretRef:
                name: {{ include "sub2api.runtimeSecretName" . }}
          startupProbe:
            httpGet:
              path: {{ default "/startupz" .Values.gateway.probes.startup.path }}
              port: http
            failureThreshold: {{ default 30 .Values.gateway.probes.startup.failureThreshold }}
            periodSeconds: {{ default 2 .Values.gateway.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ default "/livez" .Values.gateway.probes.liveness.path }}
              port: http
            periodSeconds: {{ default 30 .Values.gateway.probes.liveness.periodSeconds }}
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ default "/readyz" .Values.gateway.probes.readiness.path }}
              port: http
            periodSeconds: {{ default 10 .Values.gateway.probes.readiness.periodSeconds }}
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          {{- if .labelSelector }}
          labelSelector:
            {{- toYaml .labelSelector | nindent 12 }}
          {{- else }}
          labelSelector:
            matchLabels:
              {{- include "sub2api.gateway.selectorLabels" $ | nindent 14 }}
          {{- end }}
        {{- end }}
      {{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sub2api.fullname" . }}-control
  labels:
    {{- include "sub2api.labels" . | nindent 4 }}
    app.kubernetes.io/component: control
spec:
  {{- if not .Values.control.autoscaling.enabled }}
  replicas: {{ .Values.control.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sub2api.control.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret-shared: {{ include (print $.Template.BasePath "/runtime-secret.yaml") . | sha256sum }}
        checksum/secret-control: {{ include (print $.Template.BasePath "/control-secret.yaml") . | sha256sum }}
      labels:
        {{- include "sub2api.labels" . | nindent 8 }}
        app.kubernetes.io/component: control
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "sub2api.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: {{ default 20 .Values.control.terminationGracePeriodSeconds }}
      containers:
        - name: control
          image: "{{ .Values.image.control.repository }}:{{ .Values.image.control.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.control.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: EXTRA_FRAME_SRC_ORIGINS
              value: {{ join " " .Values.control.frontend.extraFrameSrcOrigins | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "sub2api.fullname" . }}
            - secretRef:
                name: {{ include "sub2api.runtimeSecretName" . }}
            {{- if ne (include "sub2api.controlSecretName" .) (include "sub2api.runtimeSecretName" .) }}
            - secretRef:
                name: {{ include "sub2api.controlSecretName" . }}
            {{- end }}
          startupProbe:
            httpGet:
              path: {{ default "/startupz" .Values.control.probes.startup.path }}
              port: http
            failureThreshold: {{ default 30 .Values.control.probes.startup.failureThreshold }}
            periodSeconds: {{ default 2 .Values.control.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ default "/livez" .Values.control.probes.liveness.path }}
              port: http
            periodSeconds: {{ default 30 .Values.control.probes.liveness.periodSeconds }}
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ default "/readyz" .Values.control.probes.readiness.path }}
              port: http
            periodSeconds: {{ default 10 .Values.control.probes.readiness.periodSeconds }}
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.control.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          env:
            - name: CONTROL_UPSTREAM
              value: "http://127.0.0.1:8080"
            - name: GATEWAY_UPSTREAM
              value: "http://{{ include "sub2api.fullname" . }}-gateway:{{ .Values.service.port }}"
            - name: EXTRA_FRAME_SRC_ORIGINS
              value: {{ join " " .Values.control.frontend.extraFrameSrcOrigins | quote }}
          ports:
            - name: frontend
              containerPort: {{ .Values.control.frontend.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.control.frontend.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.control.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          {{- if .labelSelector }}
          labelSelector:
            {{- toYaml .labelSelector | nindent 12 }}
          {{- else }}
          labelSelector:
            matchLabels:
              {{- include "sub2api.control.selectorLabels" $ | nindent 14 }}
          {{- end }}
        {{- end }}
      {{- end }}

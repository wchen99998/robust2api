apiVersion: v1
kind: Service
metadata:
  name: {{ include "sub2api.fullname" . }}-gateway
  labels:
    {{- include "sub2api.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if ((.Values.observability).enabled) }}
    - port: {{ .Values.observability.otel.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "sub2api.gateway.selectorLabels" . | nindent 4 }}

{{- $ing := .Values.ingress -}}
{{- if and .Values.control.enabled .Values.frontend.enabled $ing.enabled ($ing.control.enabled) }}
{{- $controlHost := required "ingress.control.host or public.baseDomain must be set when ingress.enabled and ingress.control.enabled are true" (include "sub2api.controlHost" . | trim) -}}
{{- $controlMaxBodySize := default $ing.maxBodySize $ing.control.maxBodySize -}}
{{- $annotations := dict
      "external-dns.alpha.kubernetes.io/cloudflare-proxied" ($ing.cloudflareProxied | toString)
      "nginx.ingress.kubernetes.io/proxy-body-size" ($controlMaxBodySize | toString)
  -}}
{{- $annotations = mergeOverwrite $annotations (default dict $ing.annotations) (default dict $ing.control.annotations) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sub2api.fullname" . }}-control
  labels:
    {{- include "sub2api.labels" . | nindent 4 }}
    app.kubernetes.io/component: control
  annotations:
    external-dns.alpha.kubernetes.io/hostname: >-
      {{ $controlHost }}{{ range $ing.control.extraHosts }},{{ .host }}{{ end }}
    {{- toYaml $annotations | nindent 4 }}
spec:
  {{- if $ing.className }}
  ingressClassName: {{ $ing.className | quote }}
  {{- end }}
  {{- if $ing.control.tls.enabled }}
  tls:
    - hosts:
        - {{ $controlHost | quote }}
        {{- range $ing.control.extraHosts }}
        - {{ .host | quote }}
        {{- end }}
      secretName: {{ default (printf "%s-control-tls" (include "sub2api.fullname" .)) $ing.control.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ $controlHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sub2api.frontendServiceName" . }}
                port:
                  name: http
    {{- range $ing.control.extraHosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sub2api.frontendServiceName" $ }}
                port:
                  name: http
    {{- end }}
{{- end }}

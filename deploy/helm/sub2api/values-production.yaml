# =============================================================================
# Production Overrides
# =============================================================================
# Usage: helm install sub2api ./deploy/helm/sub2api -f ./deploy/helm/sub2api/values-production.yaml
#
# IMPORTANT: Set secrets via --set flags or external secret management, NOT in this file.
#   helm install sub2api ./deploy/helm/sub2api \
#     -f ./deploy/helm/sub2api/values-production.yaml \
#     --set secrets.jwtSecret=<value> \
#     --set secrets.totpEncryptionKey=<value> \
#     --set secrets.adminPassword=<value>
# =============================================================================

gateway:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
control:
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  pdb:
    enabled: true
    minAvailable: 1
  frontend:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi
    extraFrameSrcOrigins: []

worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

config:
  # Set this to your Grafana ingress/base URL when monitoring is enabled so
  # the admin dashboard can embed Grafana directly.
  # grafanaUrl: https://grafana.example.com
  database:
    maxOpenConns: 256
    maxIdleConns: 128

  redis:
    poolSize: 4096
    minIdleConns: 256

ingress:
  enabled: true
  className: "nginx"
  cloudflareProxied: "true"
  maxBodySize: "50m"
  annotations: {}
  tls:
    enabled: true
  gateway:
    enabled: true
    host: gateway.sub2api.example.com
    extraHosts: []
    tls:
      enabled: true
      secretName: ""
  control:
    enabled: true
    host: app.sub2api.example.com
    extraHosts: []
    tls:
      enabled: true
      secretName: ""

# Disable in-cluster databases for production (use managed services)
postgresql:
  enabled: false

redis:
  enabled: false

# Configure external services
externalDatabase:
  host: your-postgres-host.example.com
  port: 5432
  user: sub2api
  password: ""
  database: sub2api
  sslmode: require

externalRedis:
  host: your-redis-host.example.com
  port: 6379
  password: ""
  enableTLS: true

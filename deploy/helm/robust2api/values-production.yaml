# =============================================================================
# Production Overrides
# =============================================================================
# Usage: helm install robust2api ./deploy/helm/robust2api -f ./deploy/helm/robust2api/values-production.yaml
#
# IMPORTANT: Set secrets via --set flags or external secret management, NOT in this file.
#   helm install robust2api ./deploy/helm/robust2api \
#     -f ./deploy/helm/robust2api/values-production.yaml \
#     --set secrets.jwtSecret=<value> \
#     --set secrets.totpEncryptionKey=<value> \
#     --set secrets.adminPassword=<value>
# =============================================================================

gateway:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
control:
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  pdb:
    enabled: true
    minAvailable: 1
  frontend:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "500m"
        memory: 512Mi
    extraFrameSrcOrigins: []

worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

public:
  baseDomain: example.com
  gateway:
    scheme: https
  control:
    scheme: https
  grafana:
    # Enable this when the monitoring chart also follows the default
    # grafana-<namespace>.<public.baseDomain> convention.
    enabled: true
    # Mirror monitoring.grafanaIngress.host here when Grafana uses a vanity/shared hostname.
    host: ""
    scheme: https

config:
  # Optional explicit override for a shared or vanity Grafana URL.
  # When empty and public.grafana.enabled=true, the chart derives
  # <public.grafana.scheme>://<public.grafana.host or grafana-monitoring.<public.baseDomain>>.
  # grafanaUrl: https://grafana.example.com
  database:
    maxOpenConns: 256
    maxIdleConns: 128

  redis:
    poolSize: 4096
    minIdleConns: 256

ingress:
  enabled: true
  className: "nginx"
  cloudflareProxied: "true"
  # Shared default for ingresses without a per-service override.
  maxBodySize: "50m"
  annotations: {}
  gateway:
    enabled: true
    # Raise this when the gateway needs to accept large multimodal payloads.
    maxBodySize: ""
    tls:
      enabled: true
      secretName: ""
  control:
    enabled: true
    maxBodySize: ""
    tls:
      enabled: true
      secretName: ""

observability:
  otel:
    environment: production

# Disable in-cluster databases for production (use managed services)
postgresql:
  enabled: false

redis:
  enabled: false

# Configure external services
externalDatabase:
  host: your-postgres-host.example.com
  port: 5432
  user: robust2api
  password: ""
  database: robust2api
  sslmode: require

grafanaProvisioning:
  # Enable this when Grafana dashboard provisioning is managed separately and
  # you have supplied the read-only database credentials via secret management.
  enabled: false
  monitoringNamespace: monitoring
  datasource:
    name: Robust2API PostgreSQL
    uid: robust2api-pg
    postgresVersion: 1700
  reader:
    username: grafana_reader
    password: ""

externalRedis:
  host: your-redis-host.example.com
  port: 6379
  password: ""
  enableTLS: true

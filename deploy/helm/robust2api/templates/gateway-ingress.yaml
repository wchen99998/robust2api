{{- $ing := .Values.ingress -}}
{{- if and .Values.gateway.enabled $ing.enabled ($ing.gateway.enabled) }}
{{- $gatewayHost := required "ingress.gateway.host or public.baseDomain must be set when ingress.enabled and ingress.gateway.enabled are true" (include "robust2api.gatewayHost" . | trim) -}}
{{- $gatewayMaxBodySize := default $ing.maxBodySize $ing.gateway.maxBodySize -}}
{{- $annotations := dict
      "external-dns.alpha.kubernetes.io/cloudflare-proxied" ($ing.cloudflareProxied | toString)
      "nginx.ingress.kubernetes.io/proxy-body-size" ($gatewayMaxBodySize | toString)
  -}}
{{- $annotations = mergeOverwrite $annotations (default dict $ing.annotations) (default dict $ing.gateway.annotations) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "robust2api.fullname" . }}-gateway
  labels:
    {{- include "robust2api.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  annotations:
    external-dns.alpha.kubernetes.io/hostname: >-
      {{ $gatewayHost }}{{ range $ing.gateway.extraHosts }},{{ .host }}{{ end }}
    {{- toYaml $annotations | nindent 4 }}
spec:
  {{- if $ing.className }}
  ingressClassName: {{ $ing.className | quote }}
  {{- end }}
  {{- if $ing.gateway.tls.enabled }}
  tls:
    - hosts:
        - {{ $gatewayHost | quote }}
        {{- range $ing.gateway.extraHosts }}
        - {{ .host | quote }}
        {{- end }}
      secretName: {{ default (printf "%s-gateway-tls" (include "robust2api.fullname" .)) $ing.gateway.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ $gatewayHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "robust2api.fullname" . }}-gateway
                port:
                  name: http
    {{- range $ing.gateway.extraHosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "robust2api.fullname" $ }}-gateway
                port:
                  name: http
    {{- end }}
{{- end }}

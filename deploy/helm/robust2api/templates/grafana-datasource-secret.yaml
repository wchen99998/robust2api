{{- if .Values.grafanaProvisioning.enabled }}
{{- $readerUser := required "grafanaProvisioning.reader.username is required when grafanaProvisioning.enabled=true" .Values.grafanaProvisioning.reader.username }}
{{- $readerPassword := required "grafanaProvisioning.reader.password is required when grafanaProvisioning.enabled=true" .Values.grafanaProvisioning.reader.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "robust2api.grafanaDatasourceSecretName" . }}
  namespace: {{ .Values.grafanaProvisioning.monitoringNamespace | quote }}
  labels:
    {{- include "robust2api.labels" . | nindent 4 }}
    grafana_datasource: "1"
type: Opaque
stringData:
  pg-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: {{ .Values.grafanaProvisioning.datasource.name | quote }}
        type: postgres
        uid: {{ .Values.grafanaProvisioning.datasource.uid | quote }}
        access: proxy
        url: {{ printf "%s:%s" (include "robust2api.grafanaDatasourceHost" .) (include "robust2api.databasePort" .) | quote }}
        user: {{ $readerUser | quote }}
        database: {{ include "robust2api.databaseName" . | quote }}
        isDefault: false
        editable: false
        jsonData:
          sslmode: {{ include "robust2api.databaseSSLMode" . | quote }}
          postgresVersion: {{ default 1700 .Values.grafanaProvisioning.datasource.postgresVersion }}
          timescaledb: false
        secureJsonData:
          password: {{ $readerPassword | quote }}
{{- end }}

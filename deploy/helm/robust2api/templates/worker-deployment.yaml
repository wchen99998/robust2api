{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "robust2api.fullname" . }}-worker
  labels:
    {{- include "robust2api.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "robust2api.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/runtime-secret.yaml") . | sha256sum }}
      labels:
        {{- include "robust2api.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "robust2api.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: {{ default 30 .Values.worker.terminationGracePeriodSeconds }}
      containers:
        - name: worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.worker.pullPolicy }}
          {{- if ((.Values.observability).enabled) }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: APP_VERSION
              value: {{ .Values.image.worker.tag | default .Chart.AppVersion | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ include "robust2api.otelServiceName" (dict "base" .Values.observability.otel.serviceName "component" "worker") | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ include "robust2api.otelResourceAttributes" (dict "root" . "component" "worker") | quote }}
          {{- end }}
          ports:
            - name: health
              containerPort: {{ .Values.worker.healthPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "robust2api.fullname" . }}
            - secretRef:
                name: {{ include "robust2api.runtimeSecretName" . }}
          startupProbe:
            httpGet:
              path: {{ default "/startupz" .Values.worker.probes.startup.path }}
              port: health
            failureThreshold: {{ default 30 .Values.worker.probes.startup.failureThreshold }}
            periodSeconds: {{ default 2 .Values.worker.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ default "/livez" .Values.worker.probes.liveness.path }}
              port: health
            periodSeconds: {{ default 30 .Values.worker.probes.liveness.periodSeconds }}
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ default "/readyz" .Values.worker.probes.readiness.path }}
              port: health
            periodSeconds: {{ default 10 .Values.worker.probes.readiness.periodSeconds }}
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

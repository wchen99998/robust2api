apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring
  namespace: flux-system
spec:
  interval: 10m
  suspend: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/production/monitoring
  prune: true
  wait: true
  timeout: 15m
  dependsOn:
    - name: cert-manager-issuers
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars

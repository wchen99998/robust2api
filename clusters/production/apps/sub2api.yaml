apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sub2api
  namespace: sub2api
spec:
  interval: 10m
  chart:
    spec:
      chart: deploy/helm/sub2api
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  timeout: 10m
  valuesFrom:
    - kind: Secret
      name: sub2api-secrets
      valuesKey: secrets.jwtSecret
      targetPath: secrets.jwtSecret
    - kind: Secret
      name: sub2api-secrets
      valuesKey: secrets.totpEncryptionKey
      targetPath: secrets.totpEncryptionKey
    - kind: Secret
      name: sub2api-secrets
      valuesKey: secrets.adminPassword
      targetPath: secrets.adminPassword
    - kind: Secret
      name: sub2api-secrets
      valuesKey: postgresql.auth.password
      targetPath: postgresql.auth.password
    - kind: Secret
      name: sub2api-secrets
      valuesKey: redis.auth.password
      targetPath: redis.auth.password
    - kind: Secret
      name: sub2api-secrets
      valuesKey: externalDatabase.password
      targetPath: externalDatabase.password
    - kind: Secret
      name: sub2api-secrets
      valuesKey: externalRedis.password
      targetPath: externalRedis.password
  values:
    # --- Image tags (update these to deploy new versions) ---
    image:
      gateway:
        tag: "0.3.1"
      control:
        tag: "0.3.1"
      frontend:
        tag: "0.3.0"
      worker:
        tag: "0.3.1"
      bootstrap:
        tag: "0.3.1"

    imagePullSecrets:
      - name: ghcr-pull

    # --- Public Endpoint Convention ---
    public:
      baseDomain: wuhao99.com
      gateway:
        scheme: https
      control:
        scheme: https
      grafana:
        enabled: true
        scheme: https

    # --- Ingress ---
    ingress:
      enabled: true
      className: nginx
      cloudflareProxied: true
      maxBodySize: "10m"
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
      gateway:
        enabled: true
        tls:
          enabled: true
      control:
        enabled: true
        tls:
          enabled: true

    # --- Config ---
    config:
      serverPort: "8080"
      serverMode: release
      runMode: standard
      timezone: Asia/Shanghai

    # --- Observability ---
    observability:
      enabled: true
      otel:
        serviceName: sub2api
        endpoint: "monitoring-alloy.monitoring.svc:4317"
        traceSampleRate: "0.1"
        metricsPort: 9090
      serviceMonitor:
        enabled: true
        interval: 15s

    # --- Resources ---
    gateway:
      autoscaling:
        enabled: false
      pdb:
        enabled: false
      replicaCount: 1
      resources:
        limits:
          cpu: 1
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 512Mi
    control:
      autoscaling:
        enabled: false
      pdb:
        enabled: false
      replicaCount: 1
      resources:
        limits:
          cpu: 1
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 512Mi
    worker:
      healthPort: 8081
      replicaCount: 1
      resources:
        limits:
          cpu: 1
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 256Mi

    # --- Database ---
    postgresql:
      image:
        tag: latest
      auth: {}
      primary:
        persistence:
          size: 1Gi
        resources:
          limits:
            cpu: 2
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 512Mi
    redis:
      image:
        tag: latest
      master:
        persistence:
          size: 1Gi
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi

    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - postgresql
              topologyKey: kubernetes.io/hostname

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sub2api
  namespace: sub2api
spec:
  interval: 10m
  chart:
    spec:
      chart: deploy/helm/robust2api
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  timeout: 10m
  valuesFrom:
    - kind: Secret
      name: sub2api-secrets
      valuesKey: postgresql.auth.password
      targetPath: postgresql.auth.password
    - kind: Secret
      name: sub2api-secrets
      valuesKey: postgresql.auth.postgresPassword
      targetPath: postgresql.auth.postgresPassword
    - kind: Secret
      name: sub2api-secrets
      valuesKey: redis.auth.password
      targetPath: redis.auth.password
    - kind: Secret
      name: sub2api-secrets
      valuesKey: grafanaProvisioning.reader.username
      targetPath: grafanaProvisioning.reader.username
    - kind: Secret
      name: sub2api-secrets
      valuesKey: grafanaProvisioning.reader.password
      targetPath: grafanaProvisioning.reader.password
  values:
    nameOverride: sub2api

    gateway:
      enabled: false
    control:
      enabled: false
    worker:
      enabled: false
    frontend:
      enabled: false
    bootstrap:
      enabled: false

    ingress:
      enabled: false

    public:
      baseDomain: ${BASE_DOMAIN}
      grafana:
        enabled: true
        scheme: https

    grafanaProvisioning:
      enabled: true
      monitoringNamespace: monitoring
      datasource:
        name: Robust2API PostgreSQL
        uid: sub2api-pg
        postgresVersion: 1700

    postgresql:
      enabled: true
      auth: {}
      tls:
        enabled: true
        autoGenerated: true
      primary:
        persistence:
          size: 1Gi
        resources:
          limits:
            cpu: 2
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 512Mi
    redis:
      enabled: true
      auth:
        enabled: true
      architecture: standalone
      master:
        persistence:
          size: 1Gi
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi

    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - postgresql
              topologyKey: kubernetes.io/hostname
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sub2api-bootstrap
  namespace: sub2api
spec:
  interval: 10m
  dependsOn:
    - name: sub2api
  chart:
    spec:
      chart: deploy/helm/robust2api
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  timeout: 10m
  valuesFrom:
    - kind: Secret
      name: sub2api-secrets
      valuesKey: secrets.jwtSecret
      targetPath: secrets.jwtSecret
    - kind: Secret
      name: sub2api-secrets
      valuesKey: secrets.totpEncryptionKey
      targetPath: secrets.totpEncryptionKey
    - kind: Secret
      name: sub2api-secrets
      valuesKey: secrets.adminPassword
      targetPath: secrets.adminPassword
    - kind: Secret
      name: sub2api-secrets
      valuesKey: postgresql.auth.password
      targetPath: externalDatabase.password
    - kind: Secret
      name: sub2api-secrets
      valuesKey: redis.auth.password
      targetPath: externalRedis.password
  values:
    nameOverride: sub2api

    image:
      bootstrap:
        tag: "0.5.0"

    imagePullSecrets:
      - name: ghcr-pull

    gateway:
      enabled: false
    control:
      enabled: false
    worker:
      enabled: false
    frontend:
      enabled: false
    bootstrap:
      enabled: true
      manualRerunToken: ""

    ingress:
      enabled: false

    config:
      serverPort: "8080"
      serverMode: release
      runMode: standard
      timezone: Asia/Shanghai

    postgresql:
      enabled: false
    redis:
      enabled: false
    externalDatabase:
      host: sub2api-postgresql
      port: 5432
      user: sub2api
      database: sub2api
      sslmode: require
    externalRedis:
      host: sub2api-redis-master
      port: 6379
      enableTLS: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sub2api-gateway
  namespace: sub2api
spec:
  interval: 10m
  dependsOn:
    - name: sub2api-bootstrap
  chart:
    spec:
      chart: deploy/helm/robust2api
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  timeout: 10m
  valuesFrom:
    - kind: Secret
      name: sub2api-secrets
      valuesKey: postgresql.auth.password
      targetPath: externalDatabase.password
    - kind: Secret
      name: sub2api-secrets
      valuesKey: redis.auth.password
      targetPath: externalRedis.password
  values:
    nameOverride: sub2api

    image:
      gateway:
        tag: "0.5.0"

    imagePullSecrets:
      - name: ghcr-pull

    gateway:
      enabled: true
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilization: 70
      pdb:
        enabled: true
        minAvailable: 1
      replicaCount: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
      resources:
        limits:
          cpu: 1
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 512Mi
    control:
      enabled: false
    worker:
      enabled: false
    frontend:
      enabled: false
    bootstrap:
      enabled: false

    public:
      baseDomain: ${BASE_DOMAIN}
      gateway:
        scheme: https

    ingress:
      enabled: true
      className: nginx
      cloudflareProxied: true
      maxBodySize: "10m"
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
      gateway:
        enabled: true
        maxBodySize: "100m"
        annotations:
          nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
        tls:
          enabled: true
      control:
        enabled: false

    config:
      serverPort: "8080"
      serverMode: release
      runMode: standard
      timezone: Asia/Shanghai

    observability:
      enabled: true
      otel:
        serviceName: robust2api
        environment: production
        endpoint: "monitoring-alloy.monitoring.svc:4317"
        traceSampleRate: "0.05"
        metricsPort: 9090
      serviceMonitor:
        enabled: true
        interval: 15s

    postgresql:
      enabled: false
    redis:
      enabled: false
    externalDatabase:
      host: sub2api-postgresql
      port: 5432
      user: sub2api
      database: sub2api
      sslmode: require
    externalRedis:
      host: sub2api-redis-master
      port: 6379
      enableTLS: true
---

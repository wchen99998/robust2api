      serverMode: release
      runMode: standard
      timezone: Asia/Shanghai

    observability:
      enabled: true
      otel:
        serviceName: robust2api
        environment: production
        endpoint: "monitoring-alloy.monitoring.svc:4317"
        traceSampleRate: "0.05"
        metricsPort: 9090
      serviceMonitor:
        enabled: false
        interval: 15s

    postgresql:
      enabled: false
    redis:
      enabled: false
    externalDatabase:
      host: sub2api-postgresql
      port: 5432
      user: sub2api
      database: sub2api
      sslmode: require
    externalRedis:
      host: sub2api-redis-master
      port: 6379
      enableTLS: true
